<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" id="favicon" href="data:,">
<title>Claude Context Monitor</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --border: #2a2f3a;
    --text: #e6e8ec; --muted: #8b93a4; --accent: #4aa8ff;
    --green: #22c55e; --yellow: #eab308; --orange: #f97316; --red: #ef4444; --burst: #ff2d2d;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
         background: var(--bg); color: var(--text); font-size: 14px; }
  header { display: flex; align-items: center; gap: 16px; padding: 12px 20px;
           background: var(--panel); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0; color: var(--accent); font-weight: 600; }
  header .ctrl { display: flex; align-items: center; gap: 6px; }
  header label { color: var(--muted); font-size: 12px; }
  header input[type=number] { width: 110px; }
  input, select, button { background: var(--panel2); color: var(--text); border: 1px solid var(--border);
                          border-radius: 6px; padding: 5px 8px; font-size: 13px; outline: none; }
  input:focus, select:focus { border-color: var(--accent); }
  input[type=search] { width: 200px; }
  button { cursor: pointer; } button:hover { border-color: var(--accent); }
  .spacer { flex: 1; }
  .alert { display: none; padding: 10px 20px; background: rgba(239,68,68,.15);
           border-bottom: 1px solid var(--red); color: #ffb4b4; font-weight: 600; }
  .alert.show { display: block; }
  main { padding: 16px 20px; max-width: 1500px; margin: 0 auto; }
  .hero { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
          padding: 14px 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .hero .h-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
  .hero .h-proj { font-size: 17px; font-weight: 700; }
  .hero .h-bar { flex: 1; min-width: 200px; }
  .hero .h-eta { color: var(--muted); font-size: 13px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .card .k { color: var(--muted); font-size: 12px; }
  .card .v { font-size: 22px; font-weight: 700; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .card.warn { border-color: var(--orange); } .card.warn .v { color: var(--orange); }
  .card.crit { border-color: var(--red); } .card.crit .v { color: var(--red); }
  .card.active { border-color: var(--green); } .card.active .v { color: var(--green); }
  section { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
            margin-bottom: 18px; overflow: hidden; }
  section h2 { margin: 0; padding: 12px 16px; font-size: 13px; color: var(--muted);
               border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .5px;
               display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
  .tools { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 8px 12px; text-align: left; white-space: nowrap; }
  th { color: var(--muted); font-size: 12px; font-weight: 500; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  th:hover { color: var(--text); }
  th.sort-asc::after { content: " ▲"; color: var(--accent); }
  th.sort-desc::after { content: " ▼"; color: var(--accent); }
  td { border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  tr.row { cursor: pointer; } tr.row:hover { background: var(--panel2); }
  tr.row.burst td { color: var(--burst); font-weight: 700; }
  .bar { display: inline-block; width: 110px; height: 8px; background: var(--border);
         border-radius: 4px; overflow: hidden; vertical-align: middle; margin-right: 8px; }
  .bar > span { display: block; height: 100%; }
  .num { text-align: right; }
  .pill { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
  .pill.green { background: rgba(34,197,94,.15); color: var(--green); }
  .pill.yellow { background: rgba(234,179,8,.15); color: var(--yellow); }
  .pill.orange { background: rgba(249,115,22,.15); color: var(--orange); }
  .pill.red { background: rgba(239,68,68,.18); color: var(--red); }
  .pill.burst { background: var(--red); color: #fff; }
  .pill.live { background: rgba(34,197,94,.2); color: var(--green); margin-left: 4px; }
  .pname { font-weight: 600; }
  .ppath { font-size: 11px; color: var(--muted); max-width: 220px; overflow: hidden;
           text-overflow: ellipsis; white-space: nowrap; }
  .small { font-size: 12px; }
  .muted { color: var(--muted); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
                   z-index: 50; justify-content: center; align-items: flex-start; padding: 40px 16px; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
           max-width: 820px; width: 100%; max-height: 80vh; overflow: auto; padding: 20px; }
  .modal h3 { margin: 0 0 4px; color: var(--accent); }
  .modal .grid { display: grid; grid-template-columns: 120px 1fr; gap: 4px 12px; margin: 14px 0; }
  .modal .grid .k { color: var(--muted); }
  .modal .close { float: right; cursor: pointer; color: var(--muted); font-size: 20px; border: none; background: none; }
  .modal pre { white-space: pre-wrap; word-break: break-word; background: var(--panel2);
               padding: 8px; border-radius: 6px; font-size: 12px; max-height: 120px; overflow: auto; }
  .spin { display: inline-block; width: 10px; height: 10px; border: 2px solid var(--border);
          border-top-color: var(--accent); border-radius: 50%; animation: sp .8s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .spin { animation: none; } }
</style>
</head>
<body>
<header>
  <h1>Claude Context Monitor</h1>
  <div class="ctrl"><label>Max Context</label>
    <input type="number" id="maxCtx" value="__MAX_CTX__" step="50000" min="1"></div>
  <div class="ctrl"><input type="search" id="search" placeholder="搜索 项目/会话/路径…"></div>
  <div class="ctrl"><select id="filter">
    <option value="all">全部</option>
    <option value="active">仅活跃</option>
    <option value="ge90">≥90%</option>
    <option value="ge95">≥95%</option>
  </select></div>
  <div class="ctrl"><select id="sort">
    <option value="tokens">按 Token</option>
    <option value="active">按最近活跃</option>
    <option value="start">按开始时间</option>
    <option value="size">按大小</option>
  </select></div>
  <div class="ctrl"><label>刷新</label>
    <select id="interval">
      <option value="1000">1s</option>
      <option value="3000" selected>3s</option>
      <option value="5000">5s</option>
      <option value="10000">10s</option>
      <option value="0">关</option>
    </select></div>
  <div class="ctrl"><label title="超阈值时蜂鸣"><input type="checkbox" id="sound"> 提示音</label></div>
  <button id="refreshBtn">刷新</button>
  <div class="spacer"></div>
  <span class="muted" id="genAt"></span> <span class="spin" id="spin" style="visibility:hidden"></span>
</header>
<div class="alert" id="alertBar"></div>
<main>
  <div class="hero" id="hero"></div>
  <div class="cards" id="cards"></div>
  <section>
    <h2><span>Sessions</span><span class="muted" id="sessCount"></span></h2>
    <div class="tbl-wrap">
      <table id="sessTbl">
        <thead><tr>
          <th data-k="project">Project</th>
          <th data-k="short_id">Session</th>
          <th data-k="start">开始时间</th>
          <th data-k="size" class="num">Size</th>
          <th data-k="tokens" class="num">Tokens</th>
          <th data-k="used">Used</th>
          <th data-k="remaining" class="num">Remaining</th>
          <th data-k="eta">ETA</th>
          <th data-k="status">Status</th>
        </tr></thead>
        <tbody id="sessBody"></tbody>
      </table>
    </div>
  </section>
  <section>
    <h2><span>Top Largest Messages（全局）</span><span class="muted">定位 Context 暴涨来源</span></h2>
    <div class="tbl-wrap">
      <table id="msgTbl">
        <thead><tr>
          <th class="num">#</th><th>Project</th><th>Session</th><th>Kind</th>
          <th class="num">Tokens</th><th>Preview</th>
        </tr></thead>
        <tbody id="msgBody"></tbody>
      </table>
    </div>
  </section>
  <section>
    <h2>Project 排名</h2>
    <div class="tbl-wrap">
      <table id="projTbl">
        <thead><tr>
          <th>Project</th><th class="num">Sessions</th><th class="num">Total Tokens</th>
          <th>Largest Session</th><th class="num">Largest Tokens</th>
        </tr></thead>
        <tbody id="projBody"></tbody>
      </table>
    </div>
  </section>
</main>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="close" onclick="closeModal()">&times;</button>
    <h3 id="mTitle"></h3>
    <div class="muted" id="mSub"></div>
    <div class="grid" id="mGrid"></div>
    <h2 style="margin:14px 0 8px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px;border:none;padding:0">Top Largest Messages</h2>
    <div id="mMsgs"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let maxCtx = parseInt($('maxCtx').value, 10) || 1000000;
let timer = null;
let prevLevel = {}, prevBurst = {};
let allSessions = [];
let sortKey = 'tokens', sortDir = -1; // -1 desc
const LEVEL_IDX = { green:0, yellow:1, orange:2, red:3, burst:4 };
const BAR_COLOR = { green:'var(--green)', yellow:'var(--yellow)', orange:'var(--orange)', red:'var(--red)', burst:'var(--burst)' };
const FAVI_COLOR = { green:'#22c55e', yellow:'#eab308', orange:'#f97316', red:'#ef4444', burst:'#ff2d2d' };

function qs() { return `?max_context=${encodeURIComponent(maxCtx)}`; }
async function getJSON(path) {
  const r = await fetch(path + qs(), { cache: 'no-store' });
  if (!r.ok) return null;
  return r.json();
}
function fmt(n) { n = Math.round(n); return n>=1e6?(n/1e6).toFixed(1)+'M': n>=1e3?(n/1e3).toFixed(1)+'K': ''+n; }
function esc(s) { return (s==null?'':''+s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function setFavicon(level) {
  const c = FAVI_COLOR[level] || '#4aa8ff';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="13" fill="${c}"/></svg>`;
  $('favicon').href = 'data:image/svg+xml,' + encodeURIComponent(svg);
}

function setTabTitle(sessions, active) {
  let maxUsed = 0, worst = 'green';
  for (const s of sessions) {
    if (s.used_pct > maxUsed) { maxUsed = s.used_pct; worst = s.level; }
  }
  const flag = maxUsed >= 80 ? (maxUsed>=95?'🔴':maxUsed>=90?'🟠':'🟡') : '🟢';
  const at = active>0 ? ` · ${active} 活跃` : '';
  document.title = `${flag} ${maxUsed.toFixed(0)}%${at} · Claude Context`;
  setFavicon(worst);
}

function renderHero(sessions) {
  if (!sessions.length) { $('hero').innerHTML = '<span class="muted">暂无会话</span>'; return; }
  // 最近活跃 = mod_time 最新
  const cur = sessions.slice().sort((a,b)=> (b.mod_time||'').localeCompare(a.mod_time||''))[0];
  const w = Math.min(100, cur.used_pct).toFixed(1);
  const eta = cur.eta ? `· ETA ${esc(cur.eta)}` : '';
  const live = cur.active ? '<span class="pill live">活跃</span>' : '';
  $('hero').innerHTML = `
    <div style="min-width:160px"><div class="h-label">当前会话 ${live}</div>
      <div class="h-proj">${esc(cur.project)}</div>
      <div class="ppath" title="${esc(cur.cwd)}">${esc(cur.short_id)} · ${esc(cur.cwd||'')}</div></div>
    <div class="h-bar"><span class="bar" style="width:100%;display:block;height:10px"><span style="display:block;height:100%;width:${w}%;background:${BAR_COLOR[cur.level]}"></span></span>
      <div class="muted small" style="margin-top:4px">${cur.tokens.toLocaleString()} / ${maxCtx.toLocaleString()}  (${cur.used_pct.toFixed(1)}%)  · 剩余 ${cur.remaining.toLocaleString()} ${eta}</div></div>`;
}

function renderCards(o) {
  const items = [
    ['Total Sessions', o.total_sessions, ''],
    ['Total Tokens', o.total_tokens_h, ''],
    ['活跃会话', o.active_count, o.active_count>0 ? 'active':''],
    ['≥90%', o.over_90, o.over_90>0 ? 'warn':''],
    ['≥95%', o.over_95, o.over_95>0 ? 'crit':''],
  ];
  $('cards').innerHTML = items.map(([k,v,cls]) =>
    `<div class="card ${cls}"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');
  $('genAt').textContent = o.generated_at ? new Date(o.generated_at).toLocaleTimeString() : '';
}

function applyFilter(rows) {
  const q = $('search').value.trim().toLowerCase();
  const f = $('filter').value;
  return rows.filter(s => {
    if (q && !(`${s.project} ${s.short_id} ${s.session_id} ${s.cwd}`.toLowerCase().includes(q))) return false;
    if (f === 'active' && !s.active) return false;
    if (f === 'ge90' && LEVEL_IDX[s.level] < 2) return false;
    if (f === 'ge95' && LEVEL_IDX[s.level] < 3) return false;
    return true;
  });
}
function applySort(rows) {
  const k = sortKey, dir = sortDir;
  const val = s => {
    switch (k) {
      case 'tokens': return s.tokens;
      case 'used': return s.used_pct;
      case 'remaining': return s.remaining;
      case 'size': return s.file_size;
      case 'active': return s.mod_time || '';
      case 'start': return s.start_time || '';
      case 'eta': return s.eta || 'ZZZ';
      default: return s.project;
    }
  };
  return rows.slice().sort((a,b) => {
    let x=val(a), y=val(b);
    if (typeof x==='string') return x.localeCompare(y)*dir;
    return (x-y)*dir;
  });
}

function renderSessions() {
  const rows = applySort(applyFilter(allSessions));
  $('sessCount').textContent = `${rows.length} / ${allSessions.length} 个`;
  // 表头排序标记
  document.querySelectorAll('#sessTbl th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if (th.dataset.k === sortKey) th.classList.add(sortDir>0?'sort-asc':'sort-desc');
  });
  if (!rows.length) { $('sessBody').innerHTML = '<tr><td colspan="9" class="muted">（无匹配会话）</td></tr>'; return; }
  $('sessBody').innerHTML = rows.map(s => {
    const w = Math.min(100, s.used_pct).toFixed(1);
    const bar = `<span class="bar"><span style="width:${w}%;background:${BAR_COLOR[s.level]}"></span></span>`;
    const tok = (s.tokens_source==='estimate'?'~':'') + s.tokens.toLocaleString();
    const live = s.active ? '<span class="pill live">活跃</span>' : '';
    return `<tr class="row ${s.level==='burst'?'burst':''}" onclick="openDetail('${s.session_id}')">
      <td><div class="pname">${esc(s.project)}</div><div class="ppath" title="${esc(s.cwd||'')}">${esc(s.cwd||'—')}</div></td>
      <td><span class="muted">${esc(s.short_id)}</span></td>
      <td class="muted small">${esc(s.start_time_h||'—')}</td>
      <td class="num">${esc(s.file_size_h)}</td>
      <td class="num">${tok}</td>
      <td>${bar}${s.used_pct.toFixed(1)}%</td>
      <td class="num">${s.remaining.toLocaleString()}</td>
      <td class="muted small">${esc(s.eta||'—')}</td>
      <td><span class="pill ${s.level}">${s.status}</span>${live}</td>
    </tr>`;
  }).join('');
}

function renderProjects(rows) {
  if (!rows.length) { $('projBody').innerHTML = '<tr><td colspan="5" class="muted">（无项目）</td></tr>'; return; }
  $('projBody').innerHTML = rows.map(p => `<tr>
    <td>${esc(p.name)}</td>
    <td class="num">${p.session_count}</td>
    <td class="num">${esc(p.total_tokens_h)}</td>
    <td><span class="muted">${esc(p.largest_session.slice(0,8))}</span></td>
    <td class="num">${esc(p.largest_tokens_h)}</td>
  </tr>`).join('');
}

function renderMessages(rows) {
  if (!rows.length) { $('msgBody').innerHTML = '<tr><td colspan="6" class="muted">（无）</td></tr>'; return; }
  $('msgBody').innerHTML = rows.map((m,i) => `<tr class="row" onclick="openDetail('${m.session_id}')">
    <td class="num">${i+1}</td>
    <td>${esc(m.project)}</td>
    <td><span class="muted">${esc(m.short_id)}</span></td>
    <td>${esc(m.kind)}</td>
    <td class="num">${m.tokens.toLocaleString()}</td>
    <td><pre style="margin:0">${esc(m.preview)}</pre></td>
  </tr>`).join('');
}

function checkAlerts(rows) {
  let alerts = [], anyBurst = false;
  for (const s of rows) {
    const cur = LEVEL_IDX[s.level] ?? 0;
    const prev = prevLevel[s.session_id] ?? -1;
    if ((prev < 3 && cur >= 3) || (s.level === 'burst' && !prevBurst[s.session_id])) {
      // 仅对活跃会话弹通知，避免陈旧会话刷屏
      if (s.active) alerts.push(`${s.project} ${s.short_id} → ${s.used_pct.toFixed(1)}%`);
    }
    if (s.level === 'burst') anyBurst = true;
    prevLevel[s.session_id] = cur;
    prevBurst[s.session_id] = s.level === 'burst';
  }
  const bar = $('alertBar');
  if (alerts.length) {
    bar.textContent = `${alerts.length} 个活跃会话跨越阈值：` + alerts.slice(0,4).join('、') + (alerts.length>4?` 等 ${alerts.length} 个`:'');
    bar.classList.add('show');
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('Claude Context 告警', { body: alerts.slice(0,4).join('\n') });
    } else if ('Notification' in window && Notification.permission !== 'denied') {
      Notification.requestPermission();
    }
    if ($('sound').checked) beep();
  } else {
    bar.classList.remove('show');
  }
}

let audioCtx = null;
function beep() {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine'; o.frequency.value = 880; g.gain.value = 0.05;
    o.start(); o.stop(audioCtx.currentTime + 0.15);
  } catch(e) {}
}

async function refresh() {
  $('spin').style.visibility = 'visible';
  try {
    const [o, sess, proj, msgs] = await Promise.all([
      getJSON('/api/overview'), getJSON('/api/sessions'), getJSON('/api/projects'), getJSON('/api/messages?limit=20')]);
    if (o && sess) {
      allSessions = sess;
      renderHero(sess); renderCards(o); setTabTitle(sess, o.active_count);
      renderSessions(); checkAlerts(sess);
    }
    if (proj) renderProjects(proj);
    if (msgs) renderMessages(msgs);
  } catch(e) { console.error(e); }
  $('spin').style.visibility = 'hidden';
}

async function openDetail(id) {
  const d = await getJSON('/api/session/' + encodeURIComponent(id));
  if (!d) return;
  $('mTitle').textContent = d.project + ' / ' + d.short_id;
  $('mSub').textContent = d.session_id + (d.cwd ? '  ·  ' + d.cwd : '');
  const realNote = d.tokens_source==='real'
    ? `real: in ${fmt(d.input_tokens)} + cache ${fmt(d.cache_read)} + create ${fmt(d.cache_creation||0)}` : '(estimated)';
  const rows = [
    ['File Size', d.file_size_h], ['Messages', d.messages],
    ['User / Assistant', d.user + ' / ' + d.assistant],
    ['Attachments', d.attachments], ['Tool Use / Result', d.tool_use + ' / ' + d.tool_result],
    ['Context', `${d.tokens.toLocaleString()}  ·  ${realNote}`],
    ['Used', d.used_pct.toFixed(1) + '%'], ['Remaining', d.remaining.toLocaleString()],
    ['ETA to Full', d.eta || '—'],
    ['Started', d.start_time ? new Date(d.start_time).toLocaleString() : '-'],
    ['Last Active', d.mod_time ? new Date(d.mod_time).toLocaleString() : '-'],
  ];
  if (d.sidechain_tokens) rows.push(['Sidechain (excl.)', d.sidechain_tokens.toLocaleString()]);
  $('mGrid').innerHTML = rows.map(([k,v]) => `<div class="k">${k}</div><div>${esc(v)}</div>`).join('');
  $('mMsgs').innerHTML = (d.top_messages && d.top_messages.length) ? `<table><thead><tr>
    <th>#</th><th>Kind</th><th class="num">Tokens</th><th>Preview</th></tr></thead><tbody>` +
    d.top_messages.map((m,i)=>`<tr><td class="num">${i+1}</td><td>${esc(m.kind)}</td>
    <td class="num">${m.tokens.toLocaleString()}</td><td><pre>${esc(m.preview)}</pre></td></tr>`).join('') +
    '</tbody></table>' : '<div class="muted">（无）</div>';
  $('modal').classList.add('show');
}
function closeModal() { $('modal').classList.remove('show'); }
$('modal').addEventListener('click', e => { if (e.target === $('modal')) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// 表头点击排序
document.querySelectorAll('#sessTbl th').forEach(th => {
  th.addEventListener('click', () => {
    const k = th.dataset.k;
    if (sortKey === k) sortDir = -sortDir; else { sortKey = k; sortDir = (k==='project'||k==='short_id'||k==='eta'||k==='status') ? 1 : -1; }
    renderSessions();
  });
});
function schedule() {
  if (timer) { clearInterval(timer); timer = null; }
  const ms = parseInt($('interval').value, 10);
  if (ms > 0) timer = setInterval(refresh, ms);
}
$('refreshBtn').addEventListener('click', refresh);
$('maxCtx').addEventListener('change', () => { maxCtx = parseInt($('maxCtx').value,10)||1000000; refresh(); });
$('interval').addEventListener('change', schedule);
$('search').addEventListener('input', renderSessions);
$('filter').addEventListener('change', renderSessions);
$('sort').addEventListener('change', e => { sortKey = e.target.value==='active'?'active': e.target.value==='start'?'start': e.target.value==='size'?'size':'tokens'; renderSessions(); });

if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
schedule();
refresh();
</script>
</body>
</html>
